{# Expects: google_oauth_enabled — Continue-with-Google link + "or" divider above it #}
{% if google_oauth_enabled %}
<div class="relative my-6">
    <div class="absolute inset-0 flex items-center" aria-hidden="true">
        <div class="w-full border-t border-gray-200"></div>
    </div>
    <div class="relative flex justify-center text-xs uppercase tracking-wide">
        <span class="bg-white px-3 text-gray-500 font-medium">or</span>
    </div>
</div>
<a href="{{ url_for('auth_google') }}"
   class="w-full inline-flex items-center justify-center gap-3 py-3 px-4 rounded-lg border border-gray-300 bg-white text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">

        <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>

        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l.003-.001 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.689-.387-4.017z"/>

    Continue with Google
</a>
{% endif %}
