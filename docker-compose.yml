# Full stack on your own server (VPS, LAN, etc.): web app + Ollama.
# Not for Render’s single free web container — there use OPENAI_API_KEY or a public OLLAMA_BASE_URL.
#
# 1. docker compose up -d --build
# 2. docker compose exec ollama ollama pull llama3.1:8b
# 3. Open http://localhost:8000
#
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      AI_PROVIDER: auto
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-in-production}
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  ollama_data:
