# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Ollama: Render cannot run Ollama inside this small web service. Use OPENAI_API_KEY, or set
# OLLAMA_BASE_URL to a separate Ollama server (HTTPS). For app+Ollama together, use docker-compose on a VPS.
#
# New Blueprint → connect repo, or create a Web Service manually and paste the start command below.
services:
  - type: web
    name: mental-wellness-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 1
